name: the_grid_workspace
publish_to: none
environment:
  sdk: ^3.11.0
workspace:
  - packages/beads_dart
  - packages/grid_cli
  - packages/grid_exploration
  - packages/grid_devtools
  - packages/grid_runtime
  - packages/grid_engine

# genesis_tree is the M4 engine (ADR-0007). It is now consumed from pub.dev at
# the `^0.1.3` pin (grid_engine/grid_cli) — the genesis ADR-0001 D8 stabilization
# move (path-dep during dev → published copy). The path override was DROPPED so a
# per-bead worktree (the_grid-as-substation: .grid/worktrees/<sub>/<bead>, a deep
# checkout where `../genesis/packages/tree` would not resolve) gets the dep from
# pub.dev. Re-add a `dependency_overrides: genesis_tree: { path: ... }` here only
# when actively developing genesis_tree alongside the_grid.

dev_dependencies:
  melos: ^7.7.0

melos:
  scripts:
    # ---------- primary scripts ----------
    test:
      description: >-
        Run the offline unit suite (excludes `integration`-tagged tests, which
        need bd/Dolt). Runs dart test on pure-Dart packages and flutter test on
        Flutter packages.
      steps:
        - test:dart
        - test:flutter

    test:integration:
      description: >-
        Run the integration-tagged suite (requires `bd` on PATH; SQL/VM-service
        cases self-skip without GC_DOLT_PASSWORD / --enable-vm-service).
      exec: dart test -t integration
      packageFilters:
        flutter: false
        dirExists: test

    analyze:
      description: >-
        Run dart analyze on the entire workspace.
      run: dart analyze

    format:
      description: >-
        Check formatting for all Dart files. Fails if any file needs changes.
      run: dart format --output=none --set-exit-if-changed .

    build_runner:
      description: >-
        Run build_runner codegen in every package that declares it.
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        dependsOn: build_runner

    # ---------- private sub-scripts (not listed by melos run) ----------
    test:dart:
      private: true
      description: dart test on pure-Dart packages (offline; excludes integration)
      exec: dart test -x integration
      packageFilters:
        flutter: false
        dirExists: test

    test:flutter:
      private: true
      description: flutter test on Flutter packages (offline; excludes integration)
      exec: flutter test -x integration
      packageFilters:
        flutter: true
        dirExists: test
