name: grid_reconciler
description: >-
  M2 work-convergence reconciler — ports gc's convergence state machine
  (ADR-0003). Consumes grid_controller's GraphEvent stream + GraphSnapshot,
  runs the pure (state, event, snapshot) → (state', actions) reducer, and
  actuates through bd batch. Work convergence only; topology is M3/M4.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  collection: ^1.19.0
  freezed_annotation: ^3.0.0
  grid_controller: any
  json_annotation: ^4.12.0
  meta: ^1.16.0
  riverpod: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.0
  fake_async: ^1.3.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  lints: ^5.1.0
  test: ^1.25.0
