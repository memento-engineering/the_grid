name: grid_exploration
# Released as git tags per package (power_station ADR-0003 D1:
# `<package>-v<version>`); consumers pin `git: {url, ref, path}`.
version: 0.1.0
description: >-
  Exploration-protocol host for the_grid — registers lenny's ext.exploration.*
  wire protocol as Dart VM-service extensions over the controller runtime.
publish_to: none
repository: https://github.com/memento-engineering/the_grid
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  beads_dart:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME {url, tag_pattern, path}
    # descriptor (a path dep or a bare ref pin normalizes differently and
    # conflicts); the version CONSTRAINT then solves over the release tags.
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      tag_pattern: beads_dart-v{{version}}
      path: packages/beads_dart
    version: ^0.1.0
  meta: ^1.16.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
  vm_service: ^14.2.0
