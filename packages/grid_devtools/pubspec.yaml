name: grid_devtools
description: >-
  DevTools extension for the_grid. Attaches over the exploration protocol
  only (ADR-0002 Decision 3) — no direct beads_dart dependency.
publish_to: none
repository: https://github.com/memento-engineering/the_grid
resolution: workspace

environment:
  flutter: ">=3.41.0"
  sdk: ^3.11.0

dependencies:
  devtools_extensions: ^0.4.0
  dtd: ^4.0.0
  flutter:
    sdk: flutter
  vm_service: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Dev-only conformance pin: grid_devtools re-declares the exploration wire
  # constants it consumes (ADR-0002 Decision 3 says it never links this
  # package at runtime) — this dependency exists solely so the test suite can
  # assert the hand-pinned strings against the real protocol constants. Ship
  # graph is unchanged.
  grid_exploration:
    # Intra-repo sibling: a PATH dep so this package resolves when consumed
    # as a git dependency (ADR-0003 D1) — pub resolves it inside the fetched
    # checkout. Workspace/dev resolution is unchanged.
    path: ../grid_exploration
  lints: ^5.1.0
  test: any

# Match devtools_extensions' uses-material-design so icon glyphs render in
# the web build instead of tofu boxes (same caveat as lenny's
# exploration_devtools).
flutter:
  uses-material-design: true
