name: grid_engine
# Released as git tags per package (power_station ADR-0003 D1:
# `<package>-v<version>`); consumers pin `git: {url, ref, path}`.
version: 0.1.0
description: >-
  M4 tree engine — `genesis_tree` IS the engine (ADR-0007): `build(observed)`
  reconciles the running system (mount = spawn, unmount = kill, a cursor tick =
  a reconcile transition), circuits inflate into engine-private CapabilityHost
  carriers driving opaque Capability leaves whose progress is the per-node
  StepState cursor on the_grid's own session bead, and the kernel holds no
  landing/VCS/provider opinion.
publish_to: none
repository: https://github.com/memento-engineering/the_grid
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  beads_dart:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME {url, tag_pattern, path}
    # descriptor (a path dep or a bare ref pin normalizes differently and
    # conflicts); the version CONSTRAINT then solves over the release tags.
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      tag_pattern: beads_dart-v{{version}}
      path: packages/beads_dart
    version: ^0.1.0
  freezed_annotation: ^3.0.0
  # The engine. Pinned (^0.1.5) — the composition layer is EXPERIMENTAL and
  # the_grid is its triggering 2nd consumer (ADR-0007 / A34 precedent). A
  # workspace-root dependency_overrides path dep supplies it during dev.
  genesis_tree: ^0.1.5
  grid_cockpit_contract:
    git:
      url: git@github.com:memento-engineering/the_grid.git
      tag_pattern: grid_cockpit_contract-v{{version}}
      path: packages/grid_cockpit_contract
    version: ^0.1.0
  grid_runtime:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME {url, tag_pattern, path}
    # descriptor (a path dep or a bare ref pin normalizes differently and
    # conflicts); the version CONSTRAINT then solves over the release tags.
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      tag_pattern: grid_runtime-v{{version}}
      path: packages/grid_runtime
    version: ^0.1.0
  json_annotation: ^4.9.0
  meta: ^1.16.0
  path: ^1.9.0
  # The reactive value type — predictable-flutter / lenny house style; the
  # §6.6 Riverpod→StateNotifier reversal.
  state_notifier: ^1.0.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  lints: ^5.1.0
  test: ^1.25.0
