name: grid_engine
description: >-
  M4 tree engine — `genesis_tree` IS the engine. `build(observed)` reconciles
  the running system: keyed reconcile + Branch lifecycle = work lifecycle
  (mount = spawn, unmount = kill, phase = a reconcile transition). An
  opinion-light kernel whose capabilities are effect Seeds; the engine holds no
  landing/VCS/provider opinion. Consumes beads_dart's snapshot/ownership
  seams and grid_runtime's subprocess/git/chokepoint transport. ADR-0007
  (Accepted 2026-06-24).
publish_to: none
repository: https://github.com/memento-engineering/the_grid
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  beads_dart: any
  freezed_annotation: ^3.0.0
  # The engine. Pinned (^0.1.3) — the composition layer is EXPERIMENTAL and
  # the_grid is its triggering 2nd consumer (ADR-0007 / A34 precedent). A
  # workspace-root dependency_overrides path dep supplies it during dev.
  genesis_tree: ^0.1.3
  grid_runtime: any
  json_annotation: ^4.9.0
  meta: ^1.16.0
  path: ^1.9.0
  # The reactive value type — predictable-flutter / lenny house style; the
  # §6.6 Riverpod→StateNotifier reversal.
  state_notifier: ^1.0.0

dev_dependencies:
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  lints: ^5.1.0
  test: ^1.25.0
