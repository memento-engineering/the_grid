name: grid_assets
description: >-
  The_grid's opinion assets — the agent/verify/land Capability impls + the
  `code` formula + the git SourceControl, extracted out of the opinion-free
  engine (grid_engine) so the engine holds no landing/VCS/provider opinion
  (ADR-0007 §1). The composer wires these via `buildCodeRegistry` + a
  `FormulaResolver`. The in-repo home of the `power_station` assets (D-1; the
  repo extraction is deferred).
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  # The exported CLI components (the asset's Command offering — the CLI-SDK
  # model): only package:args, so no grid_cli dep and no cycle.
  args: ^2.6.0
  genesis_tree: ^0.1.3
  grid_controller: any
  grid_engine: any
  grid_federation: any
  grid_runtime: any
  meta: ^1.16.0
  path: ^1.9.0
  # The shared domain-envelope version gate (pub-style semantics over the
  # canonical parser — no hand-rolled semver).
  pub_semver: ^2.1.4

dev_dependencies:
  lints: ^5.1.0
  state_notifier: ^1.0.0
  test: ^1.25.0
  yaml: ^3.1.2
