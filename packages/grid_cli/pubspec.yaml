name: grid_cli
# Released as git tags per package (power_station ADR-0003 D1:
# `<package>-v<version>`); consumers pin `git: {url, ref, path}`.
version: 0.1.0
description: Management CLI for the_grid — `grid watch` and friends.
publish_to: none
repository: https://github.com/memento-engineering/the_grid
resolution: workspace

environment:
  sdk: ^3.11.0

executables:
  grid:

dependencies:
  args: ^2.6.0
  beads_dart:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME tag ref (a
    # path dep would normalize to a SHA descriptor and conflict).
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      ref: beads_dart-v0.1.0
      path: packages/beads_dart
  genesis_tree: ^0.1.5
  grid_engine:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME tag ref (a
    # path dep would normalize to a SHA descriptor and conflict).
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      ref: grid_engine-v0.1.0
      path: packages/grid_engine
  grid_exploration:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME tag ref (a
    # path dep would normalize to a SHA descriptor and conflict).
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      ref: grid_exploration-v0.1.0
      path: packages/grid_exploration
  grid_runtime:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME tag ref (a
    # path dep would normalize to a SHA descriptor and conflict).
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      ref: grid_runtime-v0.1.0
      path: packages/grid_runtime
  grid_sdk:
    # Intra-repo sibling as a git SELF-REF tag pin (ADR-0003 D1): pub
    # unifies git deps by REF STRING, so every route to a package —
    # sibling or external consumer — must carry the SAME tag ref (a
    # path dep would normalize to a SHA descriptor and conflict).
    # Workspace/dev resolution is unchanged; tags move in lockstep.
    git:
      url: git@github.com:memento-engineering/the_grid.git
      ref: grid_sdk-v0.1.0
      path: packages/grid_sdk
  meta: ^1.15.0
  path: ^1.9.0
  # The VM-service client `reload` drives: reloadSources + the
  # ext.exploration.grid.reload invoke.
  vm_service: ^14.2.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
