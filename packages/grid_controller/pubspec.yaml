  domain projections.
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  collection: ^1.19.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0
  meta: ^1.16.0
  mysql_client: ^0.0.27
  path: ^1.9.0
  riverpod: ^3.0.0
  stream_transform: ^2.1.0
  watcher: ^1.1.0
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.0
  fake_async: ^1.3.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  lints: ^5.1.0
  test: ^1.25.0
